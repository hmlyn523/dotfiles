# ==========================================
# 1. 基本設定
# ==========================================

# シェルパスを自動で判定（Homebrewのパスが通っている方を優先）
if-shell "[ -f /opt/homebrew/bin/zsh ]" "set -g default-shell /opt/homebrew/bin/zsh"
if-shell "[ -f /usr/local/bin/zsh ]" "set -g default-shell /usr/local/bin/zsh"

# Escキーの反応速度を最適化（Vimの操作性を向上）
set -sg escape-time 1

# フォーカスイベントを有効化（対応している端末でVimにフォーカス情報を渡す）
set -g focus-events on

# 履歴行数
set -g history-limit 10000

# マウスサポート
set -g mouse on


# ==========================================
# 2. カラー・表示設定
# ==========================================

# True Color対応
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",$TERM:Tc"

# ステータスバー（右側：日付・時刻）
set -g status-right '%Y-%m-%d %H:%M'

# 非アクティブなペインの背景色
set -g window-style 'bg=#303030'

# アクティブなペインの背景色
set -g window-active-style 'bg=#000000'


# ==========================================
# 3. キーバインド・操作設定
# ==========================================

# 設定ファイルの再読み込み
bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded!"

# ペイン分割と新規ウィンドウ（カレントディレクトリを維持）
bind '"' split-window -c "#{pane_current_path}"
bind "'" split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ペインの移動（Vimキーバインド hjkl）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R


# ==========================================
# 4. コピーモード (Vi mode)
# ==========================================

# コピーモードのキーバインドをVi風に
setw -g mode-keys vi

# 選択とコピーの設定
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# Macのクリップボードへの連携 (y でコピー時にシステム側にも保存)
# ※ Linux環境の場合は "xsel -bi" や "xclip -i -sel clip" に書き換えてください
if-shell "which pbcopy" \
    'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'