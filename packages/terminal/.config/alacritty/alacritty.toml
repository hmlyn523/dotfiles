general.live_config_reload = true

[colors]
# Primary colors (Gruvbox Dark)
primary = { background = '#282828', foreground = '#ebdbb2' }

# Normal colors
normal = { black = '#1d2021', red = '#fb4934', green = '#8ec07c', yellow = '#faf27a', blue = '#83a598', magenta = '#d3869b', cyan = '#689d6a', white = '#ebdbb2' }

# Bright colors
bright = { black = '#928374', red = '#fb4934', green = '#8ec07c', yellow = '#faf27a', blue = '#83a598', magenta = '#d3869b', cyan = '#689d6a', white = '#ebdbb2' }

# Cursor colors
cursor = { text = '#282828', cursor = '#ebdbb2' }

# Selection colors
selection = { text = '#ebdbb2', background = '#3c3836' }

[font]
size = 12

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[font.offset]
y = 2

[[keyboard.bindings]]
action = "ToggleViMode"
key = "Period"
mode = "~Search"
mods = "Control"

[[keyboard.bindings]]
action = "None"
key = "Q"
mods = "Command"

[[keyboard.bindings]]
action = "None"
key = "W"
mods = "Command"

[terminal.shell]
args = ["new-session", "-D", "-c", "#{pane_current_path}"]
program = "/opt/homebrew/bin/tmux"

[window]
decorations = "full"
dynamic_padding = true
opacity = 0.9
blur = true
option_as_alt = "both"

[window.padding]
x = 2
y = 2
